name: Docker

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: docker-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build image (local, for smoke test)
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: as-bump-maker:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test
        run: |
          set -euo pipefail
          docker run -d --name smoke -p 8080:80 as-bump-maker:ci
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8080/ > /dev/null; then
              echo "nginx is up (attempt $i)"
              break
            fi
            sleep 1
          done
          curl -sSf -o /dev/null http://localhost:8080/
          curl -sSf -o /dev/null http://localhost:8080/app.js
          curl -sSf -o /dev/null http://localhost:8080/style.css
          headers=$(curl -sI http://localhost:8080/)
          echo "$headers" | grep -qi 'Cross-Origin-Opener-Policy: same-origin'
          echo "$headers" | grep -qi 'Cross-Origin-Embedder-Policy: require-corp'
          docker rm -f smoke

      - name: Log in to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ github.sha }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.description=AS Bump Maker — browser-based bump video builder
            org.opencontainers.image.licenses=MIT
          cache-from: type=gha
          cache-to: type=gha,mode=max
