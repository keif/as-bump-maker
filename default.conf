server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  location / {
    try_files $uri $uri/ /index.html;
  }

  # helps wasm/workers behave nicer
  add_header Cross-Origin-Opener-Policy "same-origin" always;
  add_header Cross-Origin-Embedder-Policy "credentialless" always;
  add_header Cross-Origin-Resource-Policy "same-origin" always;

  location = /index.html {
    # nginx replaces (not merges) inherited add_header directives when
    # any add_header is present in a location — so the COOP/COEP/CORP
    # headers must be repeated here or /index.html loses cross-origin
    # isolation and SharedArrayBuffer (required by @ffmpeg/ffmpeg) breaks.
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Cross-Origin-Embedder-Policy "credentialless" always;
    add_header Cross-Origin-Resource-Policy "same-origin" always;
    add_header Cache-Control "no-store" always;
  }
}